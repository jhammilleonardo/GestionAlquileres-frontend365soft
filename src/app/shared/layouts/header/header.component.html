<mat-toolbar class="header" [class.sidebar-collapsed]="!sidebarExpanded()">
  <button mat-icon-button class="menu-btn" (click)="toggleSidebar()">
    <lucide-icon [img]="Menu" [size]="20"></lucide-icon>
  </button>

  <span class="header-title">Gestión de Alquileres</span>

  <span class="spacer"></span>

  <div class="header-actions">
    <!-- Notifications - Temporarily disabled until backend is ready -->
    <button mat-icon-button class="notification-btn">
      <lucide-icon [img]="Bell" [size]="20"></lucide-icon>
    </button>

    <button mat-icon-button>
      <lucide-icon [img]="Search" [size]="20"></lucide-icon>
    </button>

    <div class="divider"></div>

    <!-- User Menu -->
    <button mat-button class="user-menu-btn" [matMenuTriggerFor]="userMenu">
      <div class="user-avatar">
        {{ getUserInitials() }}
      </div>
      <span class="user-name">{{ currentUser()?.name }}</span>
    </button>

    <mat-menu #userMenu="matMenu">
      <div class="user-menu-header">
        <div class="menu-avatar">
          {{ getUserInitials() }}
        </div>
        <div class="menu-user-info">
          <div class="menu-user-name">{{ currentUser()?.name }}</div>
          <div class="menu-user-email">{{ currentUser()?.email }}</div>
        </div>
      </div>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="goToProfile()">
        <lucide-icon [img]="User" [size]="18"></lucide-icon>
        <span>Mi Perfil</span>
      </button>
      <button mat-menu-item (click)="goToSettings()">
        <lucide-icon [img]="Settings" [size]="18"></lucide-icon>
        <span>Configuración</span>
      </button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout()" class="logout-item">
        <lucide-icon [img]="LogOut" [size]="18"></lucide-icon>
        <span>Cerrar Sesión</span>
      </button>
    </mat-menu>
  </div>
</mat-toolbar>
