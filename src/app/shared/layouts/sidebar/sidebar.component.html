<aside class="sidebar" [class.collapsed]="!expanded()" [class.mobile-open]="isMobileOpen()">
  <div class="sidebar-header">
    <div class="logo-section">
      <div class="logo-icon">
        <lucide-icon [img]="Building2" [size]="18"></lucide-icon>
      </div>
      <div class="logo-text" *ngIf="expanded()">
        <h1>365Soft</h1>
        <p>Gestión de Alquileres</p>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      @for (option of menuOptions(); track option.route) {
      <li class="nav-item">
        <a class="nav-link" [routerLink]="option.route" routerLinkActive="active"
          [attr.title]="!expanded() ? option.label : ''">
          <lucide-icon class="nav-icon" [img]="getIconComponent(option.icon)" [size]="18"></lucide-icon>
          <span class="nav-label" *ngIf="expanded()">{{ option.label }}</span>
        </a>
      </li>
      }
    </ul>
  </nav>
</aside>
