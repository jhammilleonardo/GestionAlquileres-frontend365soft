<aside class="sidebar" [class.collapsed]="!expanded()">
  <div class="sidebar-header">
    <div class="logo-section">
      <div class="logo-icon">
        <lucide-icon [img]="Building2" [size]="24"></lucide-icon>
      </div>
      <div class="logo-text" *ngIf="expanded()">
        <h1>365Soft</h1>
        <p>Gestión de Alquileres</p>
      </div>
    </div>
    <button mat-icon-button class="toggle-btn" (click)="toggleSidebar()">
      <lucide-icon [img]="expanded() ? PanelLeftClose : PanelLeftOpen" [size]="20"></lucide-icon>
    </button>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      @for (option of menuOptions(); track option.route) {
      <li class="nav-item">
        <a class="nav-link" [routerLink]="option.route" routerLinkActive="active"
          [attr.title]="expanded() ? '' : option.label">
          <lucide-icon class="nav-icon" [img]="getIconComponent(option.icon)" [size]="20"></lucide-icon>
          @if (expanded()) {
          <span class="nav-label">{{ option.label }}</span>
          }
        </a>
      </li>
      }
    </ul>
  </nav>

  <div class="sidebar-footer" *ngIf="expanded()">
    <div class="user-info">
      <img [src]="currentUser()?.avatar" alt="User Avatar" class="user-avatar" />
      <div class="user-details">
        <p class="user-name">{{ currentUser()?.name }}</p>
        <p class="user-role">{{ currentUser()?.role | titlecase }}</p>
      </div>
    </div>
  </div>
</aside>
