<section class="contabilidad">
  <app-page-header
    [eyebrow]="'accounting.eyebrow' | transloco"
    [title]="'accounting.title' | transloco"
    [description]="'accounting.subtitle' | transloco"
  />

  <form class="acc-filters" (ngSubmit)="f.applyFilters()">
    <label>
      <span>{{ 'accounting.filters.from' | transloco }}</span>
      <input
        type="date"
        [ngModel]="f.fromInput()"
        (ngModelChange)="f.fromInput.set($event)"
        name="from"
      />
    </label>
    <label>
      <span>{{ 'accounting.filters.to' | transloco }}</span>
      <input
        type="date"
        [ngModel]="f.toInput()"
        (ngModelChange)="f.toInput.set($event)"
        name="to"
      />
    </label>
    <div class="acc-filter-actions">
      <button type="button" class="acc-filter-secondary" (click)="f.clearFilters()">
        {{ 'accounting.filters.clear' | transloco }}
      </button>
      <button type="submit" class="acc-filter-primary">
        {{ 'accounting.filters.apply' | transloco }}
      </button>
    </div>
  </form>

  <app-segmented-control
    [options]="f.viewOptions()"
    [ngModel]="f.view()"
    (valueChanged)="f.onViewChange($event)"
    [ariaLabel]="'accounting.viewsLabel' | transloco"
  />

  @switch (f.view()) {
    @case ('dashboard') {
      <app-acc-dashboard-view />
    }
    @case ('banks') {
      <app-acc-banks-view />
    }
    @case ('integrity') {
      <app-acc-integrity-view />
    }
    @case ('trial-balance') {
      <app-acc-trial-balance-view />
    }
    @case ('balance-sheet') {
      <app-acc-balance-sheet-view />
    }
    @case ('income-statement') {
      <app-acc-income-statement-view />
    }
    @case ('chart') {
      <app-acc-chart-view />
    }
    @case ('journal') {
      <app-acc-journal-view />
    }
  }
</section>

<app-journal-entry-dialog
  [open]="f.journalDialogOpen()"
  [accounts]="f.chartAccounts()"
  [saving]="f.postingEntry()"
  (closed)="f.closeJournalDialog()"
  (saved)="f.postJournalEntry($event)"
/>
