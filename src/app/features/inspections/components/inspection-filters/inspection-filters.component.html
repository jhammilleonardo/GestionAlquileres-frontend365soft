<form class="filters" [formGroup]="form()">
  <app-select
    formControlName="property_id"
    [label]="'inspections.property' | transloco"
    [placeholder]="'common.all' | transloco"
    [options]="propertyOptions()"
  />
  <app-select
    formControlName="status"
    [label]="'inspections.statusLabel' | transloco"
    [placeholder]="'inspections.allStatuses' | transloco"
    [options]="statusOptions()"
  />
  <app-select
    formControlName="type"
    [label]="'inspections.typeLabel' | transloco"
    [placeholder]="'common.all' | transloco"
    [options]="typeOptions()"
  />
  <div class="filter-actions">
    <app-button size="s" (clicked)="filtersApplied.emit()">
      {{ 'common.apply' | transloco }}
    </app-button>
    <app-button size="s" appearance="secondary" (clicked)="filtersCleared.emit()">
      {{ 'common.clear' | transloco }}
    </app-button>
  </div>
</form>
