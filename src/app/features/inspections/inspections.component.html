<div class="inspections-page">
  <app-page-header
    eyebrow="365Soft"
    [title]="'inspections.title' | transloco"
    [description]="'inspections.subtitle' | transloco"
  >
    <div actions class="header-actions">
      <app-button appearance="secondary" (clicked)="openCompare()">
        <lucide-icon [img]="GitCompareArrows" [size]="16" />
        {{ 'inspections.compare' | transloco }}
      </app-button>
      <app-button (clicked)="openCreate()">
        <lucide-icon [img]="Plus" [size]="16" />
        {{ 'inspections.new' | transloco }}
      </app-button>
    </div>
  </app-page-header>

  <app-inspection-filters
    [form]="filterForm"
    [propertyOptions]="propertyOptions()"
    [statusOptions]="statusFilterOptions"
    [typeOptions]="typeOptions"
    (filtersApplied)="applyFilters()"
    (filtersCleared)="clearFilters()"
  />

  @if (isLoading()) {
    <app-loading-state [label]="'inspections.loading' | transloco" />
  } @else if (inspections().length === 0) {
    <app-empty-state [title]="'inspections.empty' | transloco" />
  } @else {
    <app-inspection-table [inspections]="inspections()" (detailRequested)="openDetail($event)" />
  }
</div>

<app-inspection-form-dialog
  [open]="dialogOpen()"
  [form]="form"
  [propertyOptions]="propertyOptions()"
  [typeOptions]="typeOptions"
  [inspectorOptions]="inspectorOptions()"
  [saving]="saving()"
  (closed)="closeDialog()"
  (saved)="save()"
/>

<app-inspection-compare-dialog
  [open]="compareOpen()"
  [form]="compareForm"
  [moveInOptions]="moveInOptions()"
  [moveOutOptions]="moveOutOptions()"
  [comparing]="comparing()"
  [comparison]="comparison()"
  (closed)="closeCompare()"
  (compared)="runCompare()"
/>
