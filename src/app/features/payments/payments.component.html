<div class="pagos-container">
  <app-page-header
    eyebrow="365Soft"
    [title]="'payments.title' | transloco"
    [description]="'payments.subtitle' | transloco"
  >
    <app-payment-toolbar
      actions
      [loading]="paymentService.isLoading()"
      (refreshed)="loadData()"
      (exported)="exportCsv()"
      (createOpened)="openCreateForm()"
      (filtersToggled)="showFilters.set(!showFilters())"
    />
  </app-page-header>

  @if (paymentService.error()) {
    <div class="error-alert">
      <lucide-icon [img]="AlertCircle" [size]="20"></lucide-icon>
      <span>{{ paymentService.error() }}</span>
    </div>
  }

  @if (paymentService.stats(); as stats) {
    <app-payment-stats [stats]="stats" />
  }

  @if (showFilters()) {
    <app-payment-filters
      [form]="filterForm"
      [statusOptions]="statusOptions"
      [typeOptions]="typeOptions"
      [methodOptions]="methodOptions"
      [currencyOptions]="currencyOptions"
      (filtersApplied)="applyFilters()"
      (filtersCleared)="clearFilters()"
    />
  }

  <app-pending-approval-panel
    [payments]="filteredPendingPayments()"
    [form]="pendingFilterForm"
    [propertyOptions]="pendingPropertySelectOptions()"
    (filtersApplied)="applyPendingFilters()"
    (filtersCleared)="clearPendingFilters()"
    (proofOpened)="openProof($event)"
    (approved)="approvePayment($event)"
    (rejected)="rejectPayment($event)"
  />

  <app-payment-bulk-actions
    [selectedCount]="selectedIds().length"
    (actionSelected)="executeBulkAction($event)"
    (selectionCleared)="clearSelection()"
  />

  <app-payment-list-section
    [payments]="paymentService.payments()"
    [loading]="paymentService.isLoading()"
    [selectedIds]="selectedIds()"
    [pendingPaymentIds]="pendingPaymentIds()"
    (rowSelected)="viewPaymentDetail($event)"
    (selectionToggled)="toggleSelection($event)"
    (selectAllToggled)="$event ? selectAll() : clearSelection()"
    (approved)="approvePayment($event)"
    (rejected)="rejectPayment($event)"
  />

  @if (selectedPayment(); as payment) {
    <app-payment-detail-dialog
      [payment]="payment"
      (closed)="selectedPayment.set(null)"
      (proofOpened)="openProof($event)"
      (approved)="approvePayment($event)"
      (rejected)="rejectPayment($event)"
    />
  }

  @if (selectedProofPayment(); as payment) {
    <app-payment-proof-dialog
      [payment]="payment"
      [objectUrl]="proofObjectUrl()"
      [loading]="proofLoading()"
      [error]="proofLoadError()"
      [zoom]="proofZoom()"
      [isPdf]="isProofPdf(payment)"
      [canZoomIn]="canZoomInProof()"
      [canZoomOut]="canZoomOutProof()"
      (closed)="closeProof()"
      (zoomedIn)="zoomInProof()"
      (zoomedOut)="zoomOutProof()"
      (zoomReset)="resetProofZoom()"
    />
  }

  @if (rejectionPayment(); as payment) {
    <app-payment-reject-dialog
      [payment]="payment"
      [form]="rejectForm"
      (closed)="closeRejectDialog()"
      (submitted)="submitRejectPayment()"
    />
  }

  @if (showCreateForm()) {
    <app-payment-create-dialog
      [open]="true"
      [form]="createPaymentForm"
      [tenantSearchControl]="tenantSearchControl"
      [filteredTenants]="filteredTenants$"
      [selectedTenant]="selectedTenant()"
      [availableContracts]="availableContracts()"
      [selectedContract]="selectedContract()"
      [loadingContracts]="loadingContracts()"
      [statusOptions]="statusOptions"
      [typeOptions]="typeOptions"
      [methodOptions]="methodOptions"
      [currencyOptions]="currencyOptions"
      (closed)="closeCreateForm()"
      (tenantSelected)="onTenantSelected($event)"
      (contractSelected)="onContractSelected($event)"
      (submitted)="submitCreatePayment()"
    />
  }
</div>
