<div class="violations-page">
  <app-page-header
    eyebrow="365Soft"
    [title]="'violations.title' | transloco"
    [description]="'violations.subtitle' | transloco"
  >
    <app-button actions (clicked)="openCreate()">
      <lucide-icon [img]="Plus" [size]="16" />
      {{ 'violations.new' | transloco }}
    </app-button>
  </app-page-header>

  <app-violation-filters
    [form]="filterForm"
    [propertyOptions]="propertyOptions()"
    [statusOptions]="statusFilterOptions"
    [typeOptions]="typeFilterOptions"
    (filtersApplied)="applyFilters()"
    (filtersCleared)="clearFilters()"
  />

  @if (isLoading()) {
    <app-loading-state [label]="'violations.loading' | transloco" />
  } @else if (violations().length === 0) {
    <app-empty-state [title]="'violations.empty' | transloco" />
  } @else {
    <app-violation-list
      [violations]="violations()"
      [busyId]="busyId()"
      (notified)="notify($event)"
      (pdfRequested)="downloadPdf($event)"
      (resolveRequested)="openResolve($event)"
    />
  }
</div>

<app-violation-form-dialog
  [open]="dialogOpen()"
  [form]="form"
  [propertyOptions]="propertyOptions()"
  [tenantOptions]="tenantOptions()"
  [typeOptions]="typeOptions"
  [saving]="saving()"
  (closed)="closeDialog()"
  (saved)="save()"
  (filesSelected)="onFilesSelected($event)"
/>

<app-violation-resolve-dialog
  [open]="resolveDialogOpen()"
  [notes]="resolveNotes()"
  (closed)="closeResolve()"
  (confirmed)="confirmResolve()"
  (notesChanged)="resolveNotes.set($event)"
/>
