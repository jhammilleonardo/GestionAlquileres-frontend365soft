<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-container large" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()">✕</button>

    <div class="modal-content no-padding">
      <div class="map-header">
        <div>
          <h2 class="modal-title">Ubicación de la Propiedad</h2>
          <p class="map-address">
            {{ location.address }}, {{ location.city }}, {{ location.state }}
          </p>
        </div>
        <button class="btn-external" (click)="openInNewTab()">
          🗺️ Abrir en OpenStreetMap
        </button>
      </div>

      <div class="map-container">
        <iframe
          [src]="embedMapUrl | safe: 'resourceUrl'"
          width="100%"
          height="500"
          frameborder="0"
          style="border: 0;"
        ></iframe>
      </div>

      <div class="map-info-panel">
        <div class="info-item">
          <span class="info-icon">📍</span>
          <div>
            <div class="info-label">Dirección</div>
            <div class="info-value">{{ location.address }}</div>
          </div>
        </div>

        <div class="info-item">
          <span class="info-icon">🏙️</span>
          <div>
            <div class="info-label">Ciudad</div>
            <div class="info-value">{{ location.city }}, {{ location.state }}</div>
          </div>
        </div>

        <div class="info-item">
          <span class="info-icon">📮</span>
          <div>
            <div class="info-label">Código Postal</div>
            <div class="info-value">{{ location.zipCode }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
