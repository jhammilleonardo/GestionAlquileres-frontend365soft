<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-container large" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()">
      <lucide-icon [img]="X" [size]="18"></lucide-icon>
    </button>

    <div class="modal-content no-padding">
      <div class="map-header">
        <div>
          <h2 class="modal-title">Ubicación de la Propiedad</h2>
          <p class="map-address" *ngIf="location">
            {{ location.address }}
          </p>
        </div>
        <button class="btn-external" (click)="openInNewTab()">
          <lucide-icon [img]="Map" [size]="18" class="btn-icon-small"></lucide-icon>
          Ver en Google Maps
        </button>
      </div>

      <div class="map-container">
        <iframe
          [src]="embedMapUrl | safe: 'resourceUrl'"
          width="100%"
          height="500"
          frameborder="0"
          style="border: 0"
        ></iframe>
      </div>

      <div class="map-info-panel" *ngIf="location">
        <div class="info-item" *ngIf="location.address">
          <span class="info-icon">
            <lucide-icon [img]="MapPin" [size]="24"></lucide-icon>
          </span>
          <div>
            <div class="info-label">Dirección</div>
            <div class="info-value">{{ location.address }}</div>
          </div>
        </div>

        <div class="info-item" *ngIf="location.city">
          <span class="info-icon">
            <lucide-icon [img]="Building2" [size]="24"></lucide-icon>
          </span>
          <div>
            <div class="info-label">Ciudad</div>
            <div class="info-value">
              {{ location.city }}{{ location.state ? ', ' + location.state : '' }}
            </div>
          </div>
        </div>

        <div class="info-item" *ngIf="location.zipCode">
          <span class="info-icon">
            <lucide-icon [img]="Mailbox" [size]="24"></lucide-icon>
          </span>
          <div>
            <div class="info-label">Código Postal</div>
            <div class="info-value">{{ location.zipCode }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
