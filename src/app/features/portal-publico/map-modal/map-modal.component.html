<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-container large" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()">✕</button>

    <div class="modal-content no-padding">
      <div class="map-header">
        <div>
          <h2 class="modal-title">{{ 'public.map.title' | transloco }}</h2>
          <p class="map-address">
            {{ location.address }}
          </p>
        </div>
        <button class="btn-external" (click)="openInNewTab()">
          🗺️ {{ 'public.map.openMap' | transloco }}
        </button>
      </div>

      <div class="map-container">
        <iframe
          [src]="embedMapUrl | safe: 'resourceUrl'"
          width="100%"
          height="500"
          frameborder="0"
          style="border: 0"
        ></iframe>
      </div>

      <div class="map-info-panel">
        <div class="info-item">
          <span class="info-icon">📍</span>
          <div>
            <div class="info-label">{{ 'common.address' | transloco }}</div>
            <div class="info-value">{{ location.address }}</div>
          </div>
        </div>

        <div class="info-item" *ngIf="location.city">
          <span class="info-icon">🏙️</span>
          <div>
            <div class="info-label">{{ 'public.map.city' | transloco }}</div>
            <div class="info-value">
              {{ location.city }}{{ location.state ? ', ' + location.state : '' }}
            </div>
          </div>
        </div>

        <div class="info-item" *ngIf="location.zipCode">
          <span class="info-icon">📮</span>
          <div>
            <div class="info-label">{{ 'public.map.zipCode' | transloco }}</div>
            <div class="info-value">{{ location.zipCode }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
