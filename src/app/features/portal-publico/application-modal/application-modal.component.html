<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()">✕</button>

    <div *ngIf="!submitted" class="modal-content">
      <h2 class="modal-title">Solicitud de Alquiler</h2>
      <p class="modal-subtitle">{{ property.title }}</p>

      <form (ngSubmit)="submitApplication()" class="application-form">
        <div class="form-section">
          <h3 class="section-title">Información Personal</h3>

          <div class="form-row">
            <div class="form-group">
              <label>Nombre *</label>
              <input
                type="text"
                [(ngModel)]="application.applicantInfo.firstName"
                name="firstName"
                required
                placeholder="Juan"
              />
            </div>

            <div class="form-group">
              <label>Apellido *</label>
              <input
                type="text"
                [(ngModel)]="application.applicantInfo.lastName"
                name="lastName"
                required
                placeholder="Pérez"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email *</label>
              <input
                type="email"
                [(ngModel)]="application.applicantInfo.email"
                name="email"
                required
                placeholder="juan.perez@email.com"
              />
            </div>

            <div class="form-group">
              <label>Teléfono *</label>
              <input
                type="tel"
                [(ngModel)]="application.applicantInfo.phone"
                name="phone"
                required
                placeholder="+591 12345678"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Dirección Actual *</label>
            <input
              type="text"
              [(ngModel)]="application.applicantInfo.currentAddress"
              name="currentAddress"
              required
              placeholder="Calle Principal 123, Ciudad"
            />
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">Información Laboral</h3>

          <div class="form-row">
            <div class="form-group">
              <label>Estado Laboral *</label>
              <select
                [(ngModel)]="application.applicantInfo.employmentStatus"
                name="employmentStatus"
                required
              >
                <option value="">Seleccione...</option>
                <option value="employed">Empleado</option>
                <option value="self-employed">Independiente</option>
                <option value="retired">Jubilado</option>
                <option value="student">Estudiante</option>
                <option value="other">Otro</option>
              </select>
            </div>

            <div class="form-group">
              <label>Ingreso Mensual ($) *</label>
              <input
                type="number"
                [(ngModel)]="application.applicantInfo.monthlyIncome"
                name="monthlyIncome"
                required
                min="0"
                placeholder="3000"
              />
            </div>
          </div>

          <div class="form-group">
            <label>Fecha Deseada de Mudanza *</label>
            <input
              type="date"
              [(ngModel)]="application.applicantInfo.moveInDate"
              name="moveInDate"
              required
            />
          </div>
        </div>

        <div class="form-section">
          <h3 class="section-title">Información Adicional</h3>

          <div class="form-group">
            <label>Comentarios Adicionales</label>
            <textarea
              [(ngModel)]="application.additionalInfo"
              name="additionalInfo"
              rows="4"
              placeholder="Cuéntanos más sobre ti y por qué estás interesado en esta propiedad..."
            ></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn-cancel" (click)="closeModal()">
            Cancelar
          </button>
          <button type="submit" class="btn-submit" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Enviando...' : 'Enviar Solicitud' }}
          </button>
        </div>
      </form>
    </div>

    <div *ngIf="submitted" class="success-message">
      <div class="success-icon">✓</div>
      <h2>¡Solicitud Enviada!</h2>
      <p>Hemos recibido tu solicitud de alquiler. El agente se pondrá en contacto contigo pronto.</p>
    </div>
  </div>
</div>
