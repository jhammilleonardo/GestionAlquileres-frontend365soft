<div class="propiedades-container">
  <app-page-header
    [title]="'properties.title' | transloco"
    [description]="'properties.subtitle' | transloco"
  >
    <app-button actions (clicked)="propiedades.openCreateModal()">
      <lucide-icon [img]="Plus" [size]="18"></lucide-icon>
      {{ 'properties.new' | transloco }}
    </app-button>
  </app-page-header>

  <app-property-filters
    [filters]="propiedades.filters"
    [statusOptions]="propiedades.statusSelectOptions"
    [propertyTypeOptions]="propiedades.propertyTypeOptions()"
    (statusChanged)="propiedades.setStatusFilter($event)"
    (propertyTypeChanged)="propiedades.setPropertyTypeFilter($event)"
    (cleared)="propiedades.clearFilters()"
    (applied)="propiedades.applyFilters()"
  />

  <app-property-list-section
    [properties]="propiedades.properties()"
    [loading]="propiedades.isListLoading()"
    [imageResolver]="resolvePropertyImage"
    (createOpened)="propiedades.openCreateModal()"
    (viewed)="propiedades.viewPropertyDetail($event)"
    (edited)="propiedades.openEditModal($event)"
    (statusToggled)="propiedades.toggleStatus($event)"
    (deleted)="propiedades.deleteProperty($event)"
    (imageFailed)="propiedades.onImageError($event.property)"
  />
</div>

@if (propiedades.deleteConfirmProperty(); as property) {
  <app-property-delete-dialog
    [property]="property"
    (cancelled)="propiedades.cancelDelete()"
    (confirmed)="propiedades.confirmDelete()"
  />
}
@if (propiedades.showModal()) {
  <app-property-form-dialog
    [form]="propiedades.propertyForm"
    [mode]="propiedades.modalMode"
    [isSubmitting]="propiedades.isSubmitting()"
    [propertyTypeOptions]="propiedades.propertyTypeOptions()"
    [propertySubtypeOptions]="propiedades.propertySubtypeOptions()"
    [currencyOptions]="propiedades.currencyOptions"
    [images]="propiedades.selectedImages()"
    [validationErrors]="propiedades.validationErrors()"
    (closed)="propiedades.closeModal()"
    (saved)="propiedades.saveProperty()"
    (propertyTypeChanged)="propiedades.onPropertyTypeChange($event)"
    (imagesChanged)="propiedades.onImagesChanged($event)"
  />
}
