<section class="filters-section">
  <div class="filter-header">
    <div class="filter-title">
      <lucide-icon [img]="Filter" [size]="18" aria-hidden="true"></lucide-icon>
      <span>{{ 'common.filters' | transloco }}</span>
    </div>

    @if (hasActiveFilters()) {
      <button type="button" class="clear-link" (click)="onClear()">
        <lucide-icon [img]="X" [size]="14" aria-hidden="true"></lucide-icon>
        {{ 'common.clearFilters' | transloco }}
      </button>
    }
  </div>

  <div class="filter-grid">
    <div class="filter-field">
      <span class="filter-field__label">{{ 'common.search' | transloco }}</span>
      <app-text-field
        [label]="null"
        [ngModel]="searchValue()"
        (ngModelChange)="onSearchInput($event)"
        [placeholder]="'properties.search' | transloco"
        type="search"
        autocomplete="off"
      />
    </div>

    <app-select
      [ngModel]="filters().status ?? null"
      [label]="'common.status' | transloco"
      [placeholder]="'properties.allStatuses' | transloco"
      [options]="statusOptions()"
      (ngModelChange)="statusChanged.emit($event)"
    />

    <app-select
      [ngModel]="filters().property_type_id ?? null"
      [label]="'common.type' | transloco"
      [placeholder]="'properties.allTypes' | transloco"
      [options]="propertyTypeOptions()"
      (ngModelChange)="propertyTypeChanged.emit($event)"
    />
  </div>
</section>
