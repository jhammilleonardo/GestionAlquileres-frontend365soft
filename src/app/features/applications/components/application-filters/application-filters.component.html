<section class="filters-card" [attr.aria-label]="'solicitudes.filtersLabel' | transloco">
  <div class="filters-grid">
    <div class="search-control">
      <app-text-field
        [label]="'solicitudes.searchLabel' | transloco"
        [placeholder]="'solicitudes.searchPlaceholder' | transloco"
        type="search"
        [ngModel]="searchTerm()"
        (ngModelChange)="searchTermChanged.emit($event)"
      />
      @if (searchTerm()) {
        <button
          type="button"
          class="clear-search"
          (click)="searchCleared.emit()"
          [attr.aria-label]="'common.clear' | transloco"
        >
          <lucide-icon [img]="X" [size]="18" />
        </button>
      }
    </div>

    <app-select
      [label]="'common.status' | transloco"
      [options]="statusOptions()"
      [ngModel]="selectedStatus()"
      (ngModelChange)="selectedStatusChanged.emit($event ?? '')"
    />
  </div>
</section>
