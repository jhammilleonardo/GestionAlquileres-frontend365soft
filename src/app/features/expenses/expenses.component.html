<div class="accounting-page">
  <app-page-header
    eyebrow="365Soft"
    [title]="'accounting.expensesTitle' | transloco"
    [description]="'accounting.expensesSubtitle' | transloco"
  >
    <div actions class="header-actions">
      <app-button
        appearance="secondary"
        [disabled]="expenses().length === 0"
        (clicked)="exportCsv()"
      >
        <lucide-icon [img]="Download" [size]="16" />
        {{ 'accounting.exportExcel' | transloco }}
      </app-button>
      <app-button (clicked)="openCreate()">
        <lucide-icon [img]="Plus" [size]="16" />
        {{ 'accounting.new' | transloco }}
      </app-button>
    </div>
  </app-page-header>

  <app-expense-balance-card
    [totalIncome]="totalIncome()"
    [totalExpenses]="totalExpenses()"
    [netResult]="netResult()"
  />

  <app-expense-chart [bars]="chartBars()" />

  <app-expense-filters
    [form]="filterForm"
    [propertyOptions]="propertyOptions()"
    [categoryOptions]="categoryFilterOptions"
    (filtersApplied)="applyFilters()"
    (filtersCleared)="clearFilters()"
  />

  @if (isLoading()) {
    <app-loading-state [label]="'accounting.loading' | transloco" />
  } @else if (expenses().length === 0) {
    <app-empty-state [title]="'accounting.empty' | transloco" />
  } @else {
    <app-expense-table
      [expenses]="expenses()"
      (editRequested)="openEdit($event)"
      (deleteRequested)="deleteExpense($event)"
    />
  }
</div>

<app-expense-form-dialog
  [open]="dialogOpen()"
  [editing]="editingId() !== null"
  [form]="form"
  [propertyOptions]="propertyOptions()"
  [categoryOptions]="categoryOptions"
  [vendorOptions]="vendorOptions()"
  [saving]="saving()"
  (closed)="closeDialog()"
  (saved)="save()"
/>
