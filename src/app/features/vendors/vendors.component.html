<div class="vendors-page">
  <app-page-header
    eyebrow="365Soft"
    [title]="'vendors.title' | transloco"
    [description]="'vendors.subtitle' | transloco"
  >
    <app-button actions (clicked)="openCreate()">
      <lucide-icon [img]="Plus" [size]="16" />
      {{ 'vendors.new' | transloco }}
    </app-button>
  </app-page-header>

  <div class="vendors-toolbar">
    <app-select
      [options]="specialtyFilterOptions"
      [ariaLabel]="'vendors.filterBySpecialty' | transloco"
      [placeholder]="'vendors.allSpecialties' | transloco"
      (valueChanged)="onSpecialtyFilter($event ?? '')"
    />
  </div>

  @if (isLoading()) {
    <app-loading-state [label]="'vendors.loading' | transloco" />
  } @else if (filteredVendors().length === 0) {
    <app-empty-state [title]="'vendors.empty' | transloco" />
  } @else {
    <app-vendor-list
      [vendors]="filteredVendors()"
      (detailRequested)="openDetail($event)"
      (editRequested)="openEdit($event.vendor, $event.event)"
      (deactivateRequested)="deactivate($event.vendor, $event.event)"
    />
  }
</div>

@if (selectedVendor(); as vendor) {
  <app-vendor-detail-panel
    [vendor]="vendor"
    [history]="history()"
    [historyLoading]="historyLoading()"
    (closed)="closeDetail()"
  />
}

<app-vendor-form-dialog
  [open]="dialogOpen()"
  [editing]="editingId() !== null"
  [form]="form"
  [specialtyOptions]="specialtyOptions"
  [saving]="saving()"
  (closed)="closeDialog()"
  (saved)="save()"
/>
