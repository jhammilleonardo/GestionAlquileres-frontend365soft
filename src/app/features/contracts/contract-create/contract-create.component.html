<div class="contract-create-container">
  <div class="page-header">
    <app-button appearance="flat" (clicked)="goBack()">
      <lucide-icon [img]="ArrowLeft" [size]="20"></lucide-icon>
      {{ 'contracts.create.back' | transloco }}
    </app-button>
    <h1>{{ 'contracts.create.title' | transloco }}</h1>
  </div>

  <section class="form-card">
    @if (isLoadingTenants() || isLoadingProperties()) {
      <div class="loading-container">
        <app-loading-state [label]="'contracts.create.loading' | transloco" />
      </div>
    } @else {
      <form [formGroup]="contractForm" (ngSubmit)="onSubmit()">
        <app-contract-party-select-section
          [form]="contractForm"
          [tenantOptions]="tenantOptions()"
          [propertyOptions]="propertyOptions()"
        />

        <app-contract-date-rent-section [form]="contractForm" [showTitle]="false" />

        <app-contract-services-section [form]="contractForm" [serviceOptions]="serviceOptions" />

        <app-contract-payment-conditions-section [form]="contractForm" />

        @if (errorMessage()) {
          <div class="error-message">
            <lucide-icon [img]="AlertCircle" [size]="18" class="error-icon"></lucide-icon>
            {{ errorMessage() }}
          </div>
        }

        <app-contract-form-actions
          [invalid]="contractForm.invalid"
          [submitting]="isSubmitting()"
          idleLabelKey="contracts.create.submit"
          submittingLabelKey="contracts.create.creating"
          (cancelled)="goBack()"
        />
      </form>
    }
  </section>
</div>
