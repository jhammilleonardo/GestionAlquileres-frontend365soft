<div class="dashboard">
  @if (accessDenied()) {
    <div class="access-denied-banner" role="alert">
      <span>⚠️</span>
      <span>{{ 'dashboard.accessDenied' | transloco }}</span>
    </div>
  }

  <h1>{{ 'dashboard.title' | transloco }}</h1>
  <p>{{ 'dashboard.welcome' | transloco }}</p>

  <button class="btn-public-view" (click)="goToPublicProperties()">
    {{ 'dashboard.viewPublicPortal' | transloco }}
  </button>
</div>
