name: OSV Dependency Scan (PR)

on:
  pull_request:
    branches: [main, master]
  merge_group:
    branches: [main, master]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    permissions:
      actions: read
      contents: read
      security-events: write
